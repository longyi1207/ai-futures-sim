<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Branching timeline export</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body { padding: 1.25rem; max-width: 1100px; margin: 0 auto; }
      header h1 { margin: 0 0 0.25rem; font-size: 1.35rem; }
      header p { margin: 0 0 1rem; color: var(--muted); font-size: 0.9rem; }
      html[lang="zh"] body {
        font-family: "PingFang SC", "Noto Sans SC", "Hiragino Sans GB", system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="page-title">Branching paths to AI futures</h1>
      <p id="page-subtitle">Joint Monte Carlo · ribbon width = share of worlds</p>
    </header>
    <section class="card card-wide" id="branching-timeline">
      <div id="branching-viz"></div>
    </section>
    <script src="branching.js"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const lang = params.get("lang") === "zh" ? "zh" : "en";
      document.documentElement.lang = lang;
      const dataFile =
        lang === "zh" ? "data/branching_timeline_zh.json" : "data/branching_timeline.json";

      fetch(dataFile)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("page-title").textContent = data.meta?.title || "";
          document.getElementById("page-subtitle").textContent =
            `${data.meta?.runs || "?"} runs · seed ${data.meta?.seed ?? "?"} · ${data.meta?.subtitle || ""}`;
          renderBranchingTimeline(document.getElementById("branching-viz"), data);
          document.body.dataset.ready = "1";
        });
    </script>
  </body>
</html>
