<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Futures Sim — Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>AI Futures Sim</h1>
      <p>Load <code>calibration_summary.json</code> or <code>path_frequency.json</code> from <code>outputs/runs/</code></p>
      <input type="file" id="file" accept="application/json" />
    </header>

    <main id="app" hidden>
      <section class="grid">
        <div class="card" id="meta"></div>
        <div class="card" id="regions"></div>
        <div class="card" id="spine"></div>
        <div class="card" id="paths"></div>
      </section>
      <section class="card" id="terminals"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
