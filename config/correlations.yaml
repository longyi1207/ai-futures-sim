    source: correlation_matrix.md Cluster F + Cluster H (N10–N11)
    rho: 0.50
    hazard_sensitivity: 0.19
    events:
      - ev_us_paralysis_s2
      - ev_corp_safety_hollowing
      - ev_gaia_preemption
      - ev_bio_nearmiss_hidden
