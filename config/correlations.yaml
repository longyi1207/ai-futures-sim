# Latent cluster shocks — joint tails NOT independent.
# Source: docs/research/spine/correlation_matrix.md Clusters A–F + sovereignty (Node 7).
# Joint tail rule: correlated cluster events ≈ 3–5× product of marginal tail probs when z > 1.5σ.

model:
  ar1_phi: 0.98 # daily persistence of cluster latent shocks
  init_std: 1.0
  # log(hazard_mult) = sum(hazard_sensitivity * z_cluster); z ~ N(0,1) per cluster
  default_hazard_sensitivity: 0.18
  # Sensitivity knob: 0 disables cluster glue, 0.5/1/2 for sweep runs.
  hazard_sensitivity_scale: 1.0

clusters:
  race:
    description: Cluster A — acceleration / race (tight ↑)
    source: correlation_matrix.md Cluster A
    rho: 0.55
    hazard_sensitivity: 0.20
    events:
      - ev_no_pause_2028
      - ev_race_acceleration
      - ev_gaia_preemption
      - ev_concern_no_leak
      - ev_federal_pause_attempt_fails
      - ev_china_cdz_mobilization
      - ev_weight_theft
      - ev_open_weights_equilibrium

  bio_governance:
    description: Cluster B — physical-layer bio mitigation (tight ↑)
    source: correlation_matrix.md Cluster B
    rho: 0.50
    hazard_sensitivity: 0.16
    events:
      - ev_bmia_pass
      - ev_bmia_enforcement_weak
      - ev_eu_gpai_binds
      - ev_multilateral_screening_pilot
      - ev_bio_public_scare
      - ev_state_ai_patchwork

  bio_tail:
    description: Cluster C — bio tail risk (tight ↑)
    source: correlation_matrix.md Cluster C
    rho: 0.52
    hazard_sensitivity: 0.22
    events:
      - ev_tier3_path_open
      - ev_bio_nearmiss_hidden
      - ev_open_weights_equilibrium
      - ev_tier3_release_attempt
      - ev_bio_nearmiss_disclosed

  alignment_governance:
    description: Cluster D — transparency without brakes (modal glue)
    source: correlation_matrix.md Cluster D
    rho: 0.45
    hazard_sensitivity: 0.15
    events:
      - ev_whistle_memo
      - ev_whistle_dump
      - ev_labor_hearings_peak
      - ev_concern_no_leak

  internal_alignment_signal:
