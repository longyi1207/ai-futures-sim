# Simulation clock — one step = one calendar day
start_date: "2026-01-01"
end_date: "2050-01-01"  # exclusive end → 8766 days from start

max_fires_per_day: 2
max_eligible_checks_per_day: 12
max_spine_fires_per_day: 1
max_spine_checks_per_day: 4
record_trace: false

# Correlation latent shocks (config/correlations.yaml); set false to disable
use_correlations: true

# Run-level uncertainty around elicited p_cumulative values.
# Each run samples every event's p_cumulative from Beta(p*conc, (1-p)*conc)
# instead of using the point estimate — propagates elicitation uncertainty
# into the outcome distribution. `events: []` (default) means "all events
# with a p_cumulative"; list explicit ids to restrict to a subset.
# beta_concentration: 80 ≈ elicitation noise of a "medium" confidence estimate
# (see docs/evidence/ conf ratings) — std ≈ sqrt(p(1-p)/81), ~5.5pp at p=0.5.
probability_uncertainty:
  enabled: true
  beta_concentration: 80
  events: []

# Random seed default (override via CLI)
default_seed: 42
default_runs: 10000
